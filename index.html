<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Stream TMA Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @keyframes rocket-fly {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .rocket-anim { animation: rocket-fly 3s infinite ease-in-out; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        .nav-active { color: #60a5fa; transform: scale(1.1); }
    </style>
</head>
<body class="bg-[#0f172a] text-white select-none overflow-x-hidden font-sans">

    <div id="app-content">
        <div class="p-6 bg-gradient-to-br from-yellow-400 via-orange-500 to-red-600 rounded-b-[40px] shadow-2xl mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs font-bold opacity-80 uppercase tracking-widest">Balance</p>
                    <h1 class="text-4xl font-black mt-1 flex items-center gap-2">💰 <span id="balance">0</span></h1>
                </div>
                <div class="rocket-anim text-5xl">🚀</div>
            </div>
        </div>

        <div class="px-5 space-y-6 pb-32">
            <div class="glass p-5 rounded-3xl border border-white/10 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2">📅 Daily Check-in</h2>
                    <span id="checkinStatus" class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded-full">Ready</span>
                </div>
                <button onclick="claimDaily()" id="checkinBtn" class="w-full py-4 bg-white text-black font-black rounded-2xl active:scale-95 transition-all shadow-lg">
                    Collect 500 Coins 🎁
                </button>
            </div>

            <div class="glass p-5 rounded-3xl border border-white/10 relative">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">📺 Watch & Earn <span class="text-xs font-normal text-slate-400">(20/Day)</span></h2>
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-lg text-blue-400">Rewarded Ad</p>
                        <p class="text-xs text-slate-400" id="adProgress">0/20 Completed</p>
                    </div>
                    <button onclick="handleWatchAd()" class="bg-gradient-to-r from-blue-500 to-indigo-600 px-6 py-3 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-blue-500/20">Watch Now</button>
                </div>
                <div id="cooldownOverlay" class="hidden absolute inset-0 bg-black/90 rounded-3xl flex items-center justify-center text-center p-4 z-10">
                    <p class="text-sm font-bold text-orange-400">⏳ Cooldown Active!<br>Check back in 1 Hour</p>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-4">🔗 Extra Rewards</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="openLink('https://cpagrip.com/link1')" class="glass p-5 rounded-3xl text-center border border-white/10 active:bg-white/10 transition-all">
                        <span class="text-4xl block mb-2">🛡️</span>
                        <p class="text-lg font-black text-white leading-tight">Earn 300%<br>More 🚀💸</p>
                    </div>
                    <div onclick="openLink('https://directlink.com/link2')" class="glass p-5 rounded-3xl text-center border border-white/10 active:bg-white/10 transition-all">
                        <span class="text-4xl block mb-2">⚡</span>
                        <p class="text-lg font-black text-white leading-tight">Limited<br>Offer ⌛💸</p>
                    </div>
                </div>
            </div>

            <div class="glass p-5 rounded-3xl border border-white/10">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🏆 Top Earners</h2>
                <div class="space-y-3">
                    <div class="flex justify-between items-center text-sm"><span>🥇 User_99</span><span class="text-yellow-500 font-bold">50k 💰</span></div>
                    <div class="flex justify-between items-center text-sm opacity-70"><span>🥈 Ali_Khan</span><span class="font-bold">42k 💰</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-[#0f172a]/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center z-50">
        <button onclick="switchTab('home')" class="nav-item flex flex-col items-center gap-1 nav-active">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] font-black uppercase">Home</span>
        </button>
        <button onclick="switchTab('referral')" class="nav-item flex flex-col items-center gap-1 opacity-50">
            <span class="text-2xl">👥</span>
            <span class="text-[10px] font-black uppercase">Referral</span>
        </button>
        <button onclick="switchTab('withdraw')" class="nav-item flex flex-col items-center gap-1 opacity-50">
            <span class="text-2xl">💳</span>
            <span class="text-[10px] font-black uppercase">Withdraw</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(localStorage.getItem('balance')) || 0;
        let adsWatched = parseInt(localStorage.getItem('adsWatched')) || 0;
        let lastCheckIn = localStorage.getItem('lastCheckIn') || "";

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('adProgress').innerText = `${adsWatched}/20 Completed`;
        }

        function switchTab(tab) {
            tg.HapticFeedback.impactOccurred('light');
            // Nav styling update
            document.querySelectorAll('.nav-item').forEach(el => el.classList.add('opacity-50'));
            event.currentTarget.classList.remove('opacity-50');
            
            if(tab === 'referral') {
                tg.showPopup({ title: 'Referral Program', message: 'Invite friends to earn 10% of their lifetime earnings! 🤝\nLink: t.me/your_bot?start=' + tg.initDataUnsafe.user?.id });
            } else if(tab === 'withdraw') {
                tg.showPopup({ title: 'Withdrawal', message: 'Minimum withdraw is 10,000 Coins. Keep earning! 💸' });
            }
        }

        function claimDaily() {
            const today = new Date().toLocaleDateString();
            if (lastCheckIn === today) {
                tg.showAlert("You've already claimed your daily reward! 📅");
                return;
            }
            balance += 500;
            lastCheckIn = today;
            localStorage.setItem('balance', balance);
            localStorage.setItem('lastCheckIn', today);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
            tg.HapticFeedback.notificationOccurred('success');
            updateUI();
        }

        function handleWatchAd() {
            if (adsWatched >= 20) {
                tg.showAlert("Daily limit reached! Come back tomorrow. 🕛");
                return;
            }
            // Simulated Ad Success (Yahan Adsgram code lagayen)
            tg.showConfirm("Watch ad for 100 coins?", (ok) => {
                if(ok) {
                    adsWatched++;
                    balance += 100;
                    localStorage.setItem('balance', balance);
                    localStorage.setItem('adsWatched', adsWatched);
                    updateUI();
                    tg.HapticFeedback.impactOccurred('medium');
                }
            });
        }

        function openLink(url) {
            tg.HapticFeedback.impactOccurred('medium');
            tg.openLink(url);
        }

        updateUI();
    </script>
</body>
</html>
